<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess — Premium FIDE Chess App</title>
    <meta name="description" content="Experience a fully compliant FIDE chess game with a high-performance AI engine, smooth animations, customizable clocks, and real-time move validation.">
    
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="app-container" id="chess-app-root">
        
        <!-- ── LEFT COLUMN: BOARD PLAYGROUND ── -->
        <section class="board-section">
            
            <!-- Top Player Bar (Black Information Panel) -->
            <div class="player-bar" id="player-bar-black">
                <div class="player-info">
                    <span class="player-name" id="name-black">Black Opponent</span>
                    <div class="captured-pieces" id="captured-white"></div>
                </div>
                <div class="game-clock" id="timer-black">10:00</div>
            </div>

            <!-- Interactive Board Grid Element -->
            <div id="board-container"></div>

            <!-- Bottom Player Bar (White Information Panel) -->
            <div class="player-bar" id="player-bar-white">
                <div class="player-info">
                    <span class="player-name" id="name-white">White Player</span>
                    <div class="captured-pieces" id="captured-black"></div>
                </div>
                <div class="game-clock" id="timer-white">10:00</div>
            </div>

        </section>

        <!-- ── RIGHT COLUMN: GAME METADATA & CONTROL DASHBOARD ── -->
        <section class="control-panel">
            
            <div class="panel-header">
                <h1>Grandmaster Chess</h1>
                <div class="game-info-badge" id="turn-indicator">White's Turn</div>
            </div>

            <div id="game-state-indicator"></div>

            <!-- Interactive Match Setup Form -->
            <div class="settings-section">
                
                <div class="setting-row">
                    <label for="timer-setting">Time Control</label>
                    <select id="timer-setting">
                        <option value="none">No Time Limit</option>
                        <option value="3+2">Blitz (3 min + 2s inc)</option>
                        <option value="5+0">Blitz (5 min)</option>
                        <option value="10+0" selected>Rapid (10 min)</option>
                        <option value="15+10">Rapid (15 min + 10s inc)</option>
                        <option value="30+0">Classical (30 min)</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label for="board-theme">Board Theme</label>
                    <select id="board-theme">
                        <option value="forest" selected>Forest Green</option>
                        <option value="neon">Cyberpunk Neon</option>
                        <option value="wood">Walnut Wood</option>
                        <option value="glass">Ice Glass</option>
                        <option value="gold">Midnight Gold</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label for="auto-flip">Auto-Flip Board</label>
                    <select id="auto-flip">
                        <option value="yes" selected>Yes (Rotate on Turn)</option>
                        <option value="no">No (White always bottom)</option>
                    </select>
                </div>

            </div>

            <!-- Toolbar Buttons -->
            <div class="control-buttons">
                <button class="btn-primary" id="btn-restart" style="grid-column: span 2;">Restart Match</button>
                <button class="btn-secondary" id="btn-undo">Undo Move</button>
                <button class="btn-secondary" id="btn-flip">Flip View</button>
                <button class="btn-secondary" id="btn-draw" style="background: rgba(255, 255, 255, 0.05);">Offer Draw</button>
                <button class="btn-secondary" id="btn-resign" style="background: rgba(235, 64, 52, 0.15); color: #ff6b6b;">Resign</button>
            </div>

            <!-- Live Match Move Log Grid -->
            <div class="move-log-container">
                <table class="move-log-table">
                    <thead>
                        <tr>
                            <th style="width: 40px;">#</th>
                            <th>White</th>
                            <th>Black</th>
                        </tr>
                    </thead>
                    <tbody id="move-log-body"></tbody>
                </table>
            </div>

            <!-- Import/Export FEN / PGN Clipboard Tool -->
            <div class="data-io-section">
                <div class="setting-row">
                    <label for="fen-io-box">FEN Position String</label>
                    <div class="io-row">
                        <input type="text" id="fen-io-box" placeholder="Load or export active board layout FEN...">
                        <button class="btn-secondary" id="btn-import-fen">Load</button>
                        <button class="btn-secondary" id="btn-export-fen">Copy</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label for="pgn-io-box">Import PGN Logs</label>
                    <div class="io-row">
                        <input type="text" id="pgn-io-box" placeholder="Paste PGN moves sequence...">
                        <button class="btn-secondary" id="btn-import-pgn">Import</button>
                    </div>
                </div>
            </div>

        </section>

        <!-- ── GAME OVER SYSTEM DIALOG WINDOW (HIDDEN BY DEFAULT) ── -->
        <div class="overlay-backdrop hidden" id="game-over-overlay">
            <h2 id="game-over-title">White Wins!</h2>
            <p id="game-over-reason">By checkmate.</p>
            <button class="btn-primary" id="btn-game-over-restart" style="margin-top: 10px; padding: 12px 30px;">Play Again</button>
        </div>

        <!-- ── CONFIRMATION MODAL DIALOG (HIDDEN BY DEFAULT) ── -->
        <div class="overlay-backdrop hidden" id="confirm-overlay">
            <h2 id="confirm-title">Are you sure?</h2>
            <p id="confirm-reason">This action cannot be undone.</p>
            <div class="confirm-buttons" style="display: flex; gap: 15px; margin-top: 15px;">
                <button class="btn-primary" id="btn-confirm-yes" style="padding: 10px 25px;">Yes</button>
                <button class="btn-secondary" id="btn-confirm-no" style="padding: 10px 25px;">No</button>
            </div>
        </div>

    </main>

    <!-- Chess Application Modular Scripts -->
    <script src="js/constants.js"></script>
    <script src="js/pieces.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/board.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
